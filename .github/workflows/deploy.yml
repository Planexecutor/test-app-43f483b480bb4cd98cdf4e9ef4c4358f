name: Deploy test-app-43f483b480bb4cd98cdf4e9ef4c4358f
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
env:
  REGISTRY: ghcr.io
  ORG: planexecutor
  APP_SLUG: ${{ vars.APP_SLUG }}
  FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
  API_PORT: ${{ vars.API_PORT }}
  DOMAIN: ${{ vars.DOMAIN }}
  STACK: ${{ vars.STACK }}
 
jobs:
  # ── Build on GitHub-hosted runner (free minutes) ─────────────────────
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set short SHA
        id: sha
        run: echo "short=${{  github.sha  }}" >> $GITHUB_OUTPUT
 
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:${{ github.sha }}
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:latest
 
      - name: Build and push API image
        if: env.STACK != 'static'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-api:${{ github.sha }}
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-api:latest
 
      - name: Save SHA for deploy job
        run: echo "${{ github.sha }}" > sha.txt
 
      - name: Upload SHA artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-meta
          path: sha.txt
          retention-days: 1
 
  # ── Deploy on self-hosted Hetzner VPS runner ─────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on:
      - self-hosted
      - hetzner
      - production
    needs: build
    permissions:
      packages: read
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Download deploy meta
        uses: actions/download-artifact@v4
        with:
          name: deploy-meta
 
      - name: Set image SHA
        id: sha
        run: echo "full=$(cat sha.txt)" >> $GITHUB_OUTPUT
 
      - name: Provision database (idempotent)
        run: |
          sudo bash ~/scripts/provision-db.sh \
            "${{ env.APP_SLUG }}" \
            "${{ secrets.DB_PASSWORD }}"
 
      - name: Prepare app directory
        run: mkdir -p "/opt/apps/${{ env.APP_SLUG }}"
 
      - name: Write .env file
        run: |
          cat > "/opt/apps/${{ env.APP_SLUG }}/.env" <<EOF
          APP_SLUG=${{ env.APP_SLUG }}
          FRONTEND_PORT=${{ env.FRONTEND_PORT }}
          API_PORT=${{ env.API_PORT }}
          DATABASE_URL=postgresql://${{ env.APP_SLUG }}_user:${{ secrets.DB_PASSWORD }}@host.docker.internal:5432/${{ env.APP_SLUG }}_db
          NODE_ENV=production
          EOF
 
      - name: Write docker-compose.yml
        run: |
          FRONTEND_IMAGE="ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:${{ steps.sha.outputs.full }}"
          API_IMAGE="ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-api:${{ steps.sha.outputs.full }}"
          cat > "/opt/apps/${{ env.APP_SLUG }}/docker-compose.yml" <<EOF
          version: "3.9"
          services:
            frontend:
              image: ${FRONTEND_IMAGE}
              restart: unless-stopped
              ports:
                - "${{ env.FRONTEND_PORT }}:80"
              env_file: .env
          EOF
          if [[ "${{ env.STACK }}" != "static" ]]; then
          cat >> "/opt/apps/${{ env.APP_SLUG }}/docker-compose.yml" <<EOF
 
            api:
              image: ${API_IMAGE}
              restart: unless-stopped
              ports:
                - "${{ env.API_PORT }}:8080"
              env_file: .env
              extra_hosts:
                - "host.docker.internal:host-gateway"
          EOF
          fi
 
      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
 
      - name: Pull new images
        run: |
          cd "/opt/apps/${{ env.APP_SLUG }}"
          docker compose pull
 
      - name: Tag current as rollback
        run: |
          docker tag ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:latest \
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:rollback 2>/dev/null || true
          if [[ "${{ env.STACK }}" != "static" ]]; then
            docker tag ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-api:latest \
              ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-api:rollback 2>/dev/null || true
          fi
 
      - name: Start containers
        run: |
          cd "/opt/apps/${{ env.APP_SLUG }}"
          docker compose up -d --force-recreate --remove-orphans
 
      - name: Health check frontend
        run: |
          for i in $(seq 1 10); do
            curl -sf "http://localhost:${{ env.FRONTEND_PORT }}/" && echo "✅ Frontend healthy" && exit 0
            echo "Attempt $i/10 — waiting 3s..." && sleep 3
          done
          echo "❌ Frontend health check failed" && exit 1
 
      - name: Health check API
        if: env.STACK != 'static'
        run: |
          for i in $(seq 1 10); do
            curl -sf "http://localhost:${{ env.API_PORT }}/health" && echo "✅ API healthy" && exit 0
            echo "Attempt $i/10 — waiting 3s..." && sleep 3
          done
          echo "❌ API health check failed" && exit 1
 
      - name: Configure Nginx vhost
        run: |
          sudo bash ~/scripts/nginx-vhost.sh \
            "${{ env.APP_SLUG }}" \
            "${{ env.DOMAIN }}" \
            "${{ env.FRONTEND_PORT }}" \
            "${{ env.API_PORT }}" \
            "${{ env.STACK }}"
 
      - name: Rollback on failure
        if: failure()
        run: |
          echo "⚠️ Deploy failed — rolling back"
          cd "/opt/apps/${{ env.APP_SLUG }}"
          docker tag ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:rollback \
            ghcr.io/${{ env.ORG }}/${{ env.APP_SLUG }}-frontend:latest 2>/dev/null || true
          docker compose up -d --force-recreate
          echo "✅ Rolled back"
 
      - name: Done
        if: success()
        run: |
          echo "✅ ${{ env.APP_SLUG }} deployed"
          echo "   Frontend : https://app-${{ env.APP_SLUG }}.${{ env.DOMAIN }}"
          if [[ "${{ env.STACK }}" != "static" ]]; then
            echo "   API      : https://api-${{ env.APP_SLUG }}.${{ env.DOMAIN }}"
          fi
